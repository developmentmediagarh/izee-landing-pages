<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>izee landing pages</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container text-center" style="padding: 100px 20px">
      <h1 style="margin-bottom: 40px; font-size: 48px; color: #333">IZee Engineering Landing Pages</h1>
      <p style="font-size: 20px; margin-bottom: 50px; color: #666">Select your location to explore our services</p>

      <div class="row justify-content-center">
        <div class="col-md-5" style="margin: 20px">
          <a href="karnataka.html" style="text-decoration: none">
            <div
              style="
                padding: 60px 40px;
                background: linear-gradient(135deg, #d32f2f, #ff6f00);
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                transition: transform 0.3s ease;
              "
            >
              <h2 style="color: white; font-size: 36px; margin-bottom: 20px">🏛️ Karnataka</h2>
              <p style="color: white; font-size: 18px; opacity: 0.9">Engineering Excellence in Karnataka</p>
              <button
                style="
                  margin-top: 20px;
                  padding: 12px 30px;
                  background: #ffc107;
                  border: none;
                  border-radius: 25px;
                  font-weight: 600;
                  cursor: pointer;
                "
              >
                Visit Karnataka Page
              </button>
            </div>
          </a>
        </div>

        <div class="col-md-5" style="margin: 20px">
          <a href="hyderabad.html" style="text-decoration: none">
            <div
              style="
                padding: 60px 40px;
                background: linear-gradient(135deg, #1976d2, #00bcd4);
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                transition: transform 0.3s ease;
              "
            >
              <h2 style="color: white; font-size: 36px; margin-bottom: 20px">🏙️ Hyderabad</h2>
              <p style="color: white; font-size: 18px; opacity: 0.9">Innovative Solutions in Telangana</p>
              <button
                style="
                  margin-top: 20px;
                  padding: 12px 30px;
                  background: #4caf50;
                  color: white;
                  border: none;
                  border-radius: 25px;
                  font-weight: 600;
                  cursor: pointer;
                "
              >
                Visit Hyderabad Page
              </button>
            </div>
          </a>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
